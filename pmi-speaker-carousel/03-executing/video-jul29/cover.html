<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: 'Inter'; src: url('fonts/Inter-500.ttf'); font-weight: 500; }
  @font-face { font-family: 'Inter'; src: url('fonts/Inter-700.ttf'); font-weight: 700; }
  @font-face { font-family: 'Inter'; src: url('fonts/Inter-900.ttf'); font-weight: 900; }
  /* Tangerine monochromatic ramp ONLY */
  :root {
    --cream:  #FBF1EA;
    --orange: #FF610F;
    --rust:   #C23A10;
    --brown:  #7A2508;
    --deep:   #401305;
    --ink:    #1A0800;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 588px; height: 1044px; overflow: hidden; }
  .card {
    width: 588px; height: 1044px;
    background: var(--cream);
    font-family: 'Inter', sans-serif;
    position: relative;
    display: flex; flex-direction: column;
    padding: 52px 44px 44px;
  }
  .accent-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 14px; background: var(--orange);
  }
  .accent-corner {
    position: absolute; bottom: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 0 130px 130px;
    border-color: transparent transparent var(--orange) transparent;
  }
  .kicker {
    color: var(--rust);
    font-weight: 700;
    font-size: 21px;
    letter-spacing: 3.5px;
    margin-top: 26px;
  }
  .kicker .free {
    display: inline-block;
    background: var(--orange); color: var(--cream);
    padding: 4px 12px; border-radius: 6px; margin-top: 10px;
    white-space: nowrap;
  }
  .headline {
    color: var(--ink);
    font-weight: 900;
    font-size: 68px;
    line-height: 1.04;
    letter-spacing: -1.5px;
    margin-top: 46px;
    text-transform: uppercase;
  }
  .headline .pop { color: var(--orange); }
  .rule {
    width: 96px; height: 8px; background: var(--orange);
    border-radius: 4px; margin: 42px 0 0;
  }
  .sub {
    color: var(--deep);
    font-weight: 500;
    font-size: 27px;
    line-height: 1.35;
    margin-top: 34px;
  }
  .sub b { font-weight: 700; color: var(--rust); }
  .when {
    margin-top: auto;
    background: var(--ink);
    color: var(--cream);
    border-radius: 16px;
    padding: 26px 30px;
    font-weight: 900;
    font-size: 33px;
    line-height: 1.25;
    letter-spacing: 0.5px;
  }
  .when .noon { color: var(--orange); }
  .footer {
    color: var(--brown);
    font-weight: 700;
    font-size: 20.5px;
    margin-top: 22px;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="accent-bar"></div>
    <div class="kicker">PMI SOUTH FLORIDA<br><span class="free">FREE LUNCH &amp; LEARN</span></div>
    <div class="headline">Heard <span class="pop">nothing back</span> from 100s of applications?</div>
    <div class="rule"></div>
    <div class="sub">Stand out in today's job market — with career expert <b>Scott Singer, CPRW,&nbsp;CPCC</b></div>
    <div class="when">WEDNESDAY, JULY 29 <span class="noon">• NOON</span></div>
    <div class="footer">Free for members &amp; non-members • Registration link in post</div>
  </div>
</body>
</html>
